<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Numerology Analyzer</title>
  <style>
 body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 850px;
  margin: auto;
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  animation: fadeIn 0.6s ease;
}

h2 {
  text-align: center;
  color: #333;
  margin-bottom: 20px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
  outline: none;
  transition: 0.3s;
  font-size: 15px;
}

input:focus {
  border-color: #667eea;
  box-shadow: 0 0 8px rgba(102,126,234,0.5);
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Result Box */
.result {
  margin-top: 20px;
  padding: 20px;
  background: #f9fafc;
  border-radius: 10px;
  animation: slideUp 0.5s ease;
}

/* Cards */
.card {
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  background: white;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* Pair Styling */
.pair {
  padding: 10px;
  margin: 8px 0;
  border-left: 5px solid #667eea;
  background: #fff;
  border-radius: 6px;
  transition: 0.3s;
}

.pair:hover {
  transform: translateX(5px);
  background: #f1f3ff;
}

/* Highlight colors */
.good { border-left-color: #28a745; }
.bad { border-left-color: #dc3545; }
.neutral { border-left-color: #ffc107; }

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes slideUp {
  from {transform: translateY(20px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}
</style>

function analyze(){
  let name = document.getElementById("name").value.toUpperCase();
  let dob = document.getElementById("dob").value;
  let mobile = document.getElementById("mobile").value;
  let output = document.getElementById("output");

  output.innerHTML = "";

  // 👉 Mobile length check
  if(mobile.length !== 10){
    output.innerHTML = "<p style='color:red'><b>❌ मोबाइल नंबर 10 अंकों का होना चाहिए!</b></p>";
    return;
  }

  // 🔹 Mulank
  let day = dob.split("-")[2];
  let mulank = reduce(parseInt(day));

  // 🔹 Bhagyank
  let total = dob.replaceAll("-","").split('').reduce((a,b)=>a+ +b,0);
  let bhagyank = reduce(total);

  // 🔹 Namank
  let nameSum = 0;
  for(let char of name){
    if(chaldean[char]){
      nameSum += chaldean[char];
    }
  }
  let namank = reduce(nameSum);

  // 🔹 Mobile Pair
  let pairs = [];
  for(let i=0;i<mobile.length-1;i++){
    pairs.push(mobile[i]+mobile[i+1]);
  }

  // 👉 Helper function
  function getRelations(num){
    return chart[num] ? chart[num] : {mitra:[],neutral:[],shatru:[]};
  }

  // 👉 Namank relations
  let namankRel = getRelations(namank);
  // 👉 Bhagyank relations
  let bhagyankRel = getRelations(bhagyank);

  // 👉 Common relations
  function common(arr1,arr2){
    return arr1.filter(x=>arr2.includes(x));
  }
  let commonMitra = common(namankRel.mitra,bhagyankRel.mitra);
  let commonNeutral = common(namankRel.neutral,bhagyankRel.neutral);
  let commonShatru = common(namankRel.shatru,bhagyankRel.shatru);

  // 👉 Output
  output.innerHTML += `
    <p><b>Mulank:</b> ${mulank}</p>
    <p><b>Bhagyank:</b> ${bhagyank}</p>
    <p><b>Namank:</b> ${namank}</p>

    <h4>🧾 Namank (${namank}) Relations</h4>
    <p><b>Mitra:</b> ${namankRel.mitra.join(", ")}</p>
    <p><b>Neutral:</b> ${namankRel.neutral.join(", ")}</p>
    <p><b>Shatru:</b> ${namankRel.shatru.join(", ")}</p>

    <h4>🧾 Bhagyank (${bhagyank}) Relations</h4>
    <p><b>Mitra:</b> ${bhagyankRel.mitra.join(", ")}</p>
    <p><b>Neutral:</b> ${bhagyankRel.neutral.join(", ")}</p>
    <p><b>Shatru:</b> ${bhagyankRel.shatru.join(", ")}</p>

    <h4>🤝 Common Relations</h4>
    <p><b>Common Mitra:</b> ${commonMitra.join(", ") || "None"}</p>
    <p><b>Common Neutral:</b> ${commonNeutral.join(", ") || "None"}</p>
    <p><b>Common Shatru:</b> ${commonShatru.join(", ") || "None"}</p>

    <h4>📱 Mobile Pairs</h4>
  `;

  pairs.forEach(p=>{
  let meaning = mobileMeanings[p] || "❌ विवरण उपलब्ध नहीं है";

  // 🎨 Category decide
  let cls = "neutral";
  if(p.includes("8") || p.includes("4")) cls = "bad";
  if(p.includes("5") || p.includes("6")) cls = "good";

  // 📦 Box UI
  output.innerHTML += `
  <div class="pair ${cls}">
    <div style="font-weight:bold; font-size:16px; margin-bottom:5px;">
      🔢 Pair: ${p}
    </div>
    <div style="font-size:14px;">
      ${meaning}
    </div>
  </div>
  `;
});
}
